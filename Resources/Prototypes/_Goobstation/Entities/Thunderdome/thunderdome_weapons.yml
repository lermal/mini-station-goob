# Thunderdome laser weapons with self-recharge

- type: entity
  name: laser carbine
  parent: WeaponLaserCarbine
  id: WeaponLaserCarbineAutoRecharge
  description: An ergonomic laser carbine with a self-recharging nuclear battery. Perfect for sustained combat.
  components:
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 25

- type: entity
  name: laser sniper rifle
  parent: WeaponLaserCannon
  id: WeaponSniperLaser
  description: A high-powered laser sniper rifle with a self-recharging power cell. Delivers devastating precision shots.
  components:
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 20
    autoRechargePauseTime: 25
    autoRechargePause: true
  - type: SpeedModifiedOnWield
    walkModifier: 0.8
    sprintModifier: 0.8
  - type: CursorOffsetRequiresWield
  - type: EyeCursorOffset
    maxOffset: 3.5
    offsetSpeed: 0.5
    pvsIncrease: 0.2
