# Thunderdome medical sprays - compact versions with limited uses

- type: entity
  name: compact styptic spray
  id: SprayBottleStypticPowderThunderdome
  suffix: Thunderdome, 3 uses
  parent: SprayBottleStypticPowder
  description: A compact spray bottle loaded with styptic powder. Contains enough for 3 applications.
  components:
  - type: SolutionContainerManager
    solutions:
      spray:
        maxVol: 20  # 2 uses x 10u per spray
        reagents:
        - ReagentId: StypticPowder
          Quantity: 20

- type: entity
  name: compact silver sulfadiazine spray
  id: SprayBottleSilverSulfadiazineThunderdome
  suffix: Thunderdome, 3 uses
  parent: SprayBottleSilverSulfadiazine
  description: A compact spray bottle loaded with silver sulfadiazine. Contains enough for 3 applications.
  components:
  - type: SolutionContainerManager
    solutions:
      spray:
        maxVol: 20  # 2 uses x 10u per spray
        reagents:
        - ReagentId: SilverSulfadiazine
          Quantity: 20
