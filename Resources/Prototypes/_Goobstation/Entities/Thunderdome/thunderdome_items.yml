# Thunderdome custom items

# Compact portable recharger for laser loadouts
- type: entity
  parent: PortableRecharger
  id: PortableRechargerCompact
  name: compact portable recharger
  description: A compact version of the portable recharger. Smaller, but just as effective.
  components:
  - type: Item
    size: Small
    shape:
    - 0,0,1,1

# Ephedrine autoinjector for Thunderdome medical loadout
- type: entity
  parent: ChemicalMedipen
  id: EphedrineAutoInjectorThunderdome
  name: ephedrine autoinjector
  description: A rapid-injection autoinjector loaded with 10 units of ephedrine. Provides a quick combat stimulant boost.
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Specific/Medical/stasipen.rsi
    layers:
    - state: stasipen
      map: ["enum.SolutionContainerLayers.Fill"]
  - type: SolutionContainerVisuals
    maxFillLevels: 1
    changeColor: false
    emptySpriteName: stasipen_empty
  - type: Hypospray
    solutionName: pen
    transferAmount: 10
    onlyAffectsMobs: false
    injectOnly: true
  - type: SolutionContainerManager
    solutions:
      pen:
        maxVol: 10
        reagents:
        - ReagentId: Ephedrine
          Quantity: 10

