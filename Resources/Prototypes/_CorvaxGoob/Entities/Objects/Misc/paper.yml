- type: entity
  parent: Paper
  id: StationGoalPaper
  name: station goal centcomm message
  description: 'It looks like you have a lot of work to do.'
  components:
    - type: Paper
      stampState: paper_stamp-centcom
      stampedBy:
      - stampedName: stamp-component-stamped-name-centcom
        stampedColor: "#bb3232"

- type: entity
  parent: Paper
  id: YellowPaper
  name: yellow paper
  description: 'A piece of yellow paper.'
  components:
  - type: Sprite
    layers:
    - state: paper
      color: "#fffb1f"
    - state: paper_words
      map: ["enum.PaperVisualLayers.Writing"]
      color: "#fffb1f"
      visible: false
    - state: paper_stamp-generic
      map: ["enum.PaperVisualLayers.Stamp"]
      color: "#fffb1f"
      visible: false
  - type: PaperVisuals
    backgroundModulate: "#fffb1f"

