- type: entity
  parent: [Paper, BaseSyndicateContraband]
  id: BloodRedPaper
  name: blood-red paper
  description: 'A piece of suspicious paper.'
  components:
  - type: Sprite
    layers:
    - state: paper
      color: "#b50012"
    - state: paper_words
      map: ["enum.PaperVisualLayers.Writing"]
      visible: false
      color: "#b50012"
    - state: paper_stamp-generic
      map: ["enum.PaperVisualLayers.Stamp"]
      color: "#b50012"
      visible: false
  - type: PaperVisuals
    headerImagePath: "/Textures/Interface/Paper/paper_heading_syndicate_logo.svg.96dpi.png"
    headerMargin: 8.0, 8.0, 8.0, 12.0
    backgroundImagePath: "/Textures/Interface/Paper/paper_background_blood_red.svg.96dpi.png"
    backgroundPatchMargin: 8.0, 8.0, 8.0, 8.0
    contentMargin: 12.0, 12.0, 12.0, 12.0