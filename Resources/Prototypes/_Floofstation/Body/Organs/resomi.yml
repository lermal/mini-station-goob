- type: entity # Goobstation - resomi stomach
  id: OrganResomiStomach
  parent: OrganAnimalStomach
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _CorvaxGoob/Mobs/Species/Resomi/organs.rsi # CorvaxGoob resprite
    state: stomach
  - type: Stomach
  - type: SolutionContainerManager
    solutions:
      stomach:
        maxVol: 50
      food:
        maxVol: 5
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 5

# CorvaxGoob organs resprite start

- type: entity
  id: OrganResomiBrain
  parent: OrganHumanBrain
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _CorvaxGoob/Mobs/Species/Resomi/organs.rsi
    state: brain

- type: entity
  id: OrganResomiEyes
  parent: OrganHumanEyes
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _CorvaxGoob/Mobs/Species/Resomi/organs.rsi
    layers:
      - state: eyeball-l
      - state: eyeball-r

- type: entity
  id: OrganResomiHeart
  parent: OrganHumanHeart
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _CorvaxGoob/Mobs/Species/Resomi/organs.rsi
    state: heart-on

- type: entity
  id: OrganResomiLungs
  parent: OrganHumanLungs
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _CorvaxGoob/Mobs/Species/Resomi/organs.rsi
    layers:
      - state: lung-l
      - state: lung-r

- type: entity
  id: OrganResomiLiver
  parent: OrganHumanLiver
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _CorvaxGoob/Mobs/Species/Resomi/organs.rsi
    state: liver

- type: entity
  id: OrganResomiKidneys
  parent: OrganHumanKidneys
  categories: [ HideSpawnMenu ]
  components:
