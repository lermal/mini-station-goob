- type: entity
  id: BaseBorgChassisTypan
  parent: [BaseBorgChassis, BaseBorgTransponder]
  abstract: true
  name: cyborg
  description: A man-machine hybrid that assists in station activity. They love being asked to state their laws over and over.
  suffix: Тайпан
  components:
    - type: Sprite
      sprite: _Mini/Mobs/Silicon/chassis.rsi
    - type: RandomMetadata
      nameSegments:
        - NamesBorg
    - type: NpcFactionMember
      factions:
        - Typan
    - type: Access
      groups:
        - TypanAccess
    - type: AccessReader
      access: [["TypanCommand"], ["TypanResearch"]]
    - type: ShowSyndicateIcons
    - type: SiliconLawProvider
      laws: TypanStatic
      subverted: false
    - type: IntrinsicRadioTransmitter
      channels:
        - Binary # But that has really long range
        - Typan
    - type: ActiveRadio
      channels:
        - Typan
    - type: Speech
      speechVerb: Robotic
      speechSounds: SyndieBorg
      allowedEmotes:
        - Laugh
    - type: Vocal
      sounds:
        Unsexed: UnisexSiliconSyndicate
    - type: Damageable
      damageModifierSet: CombatBorg
    - type: InteractionPopup
      interactSuccessString: petting-success-syndicate-cyborg
      interactFailureString: petting-failure-syndicate-cyborg
      interactSuccessSound:
        path: /Audio/Ambience/Objects/periodic_beep.ogg
    - type: BorgTransponder
      #   isTypan: true
      name: cyborg
    - type: Tag
      tags:
        - DoorBumpOpener
        - FootstepSound
        - CanPilot
        - Unimplantable
        - SiliconMob
        - IPCDrinkBlacklist
        - SiliconEmotes
        - Typan

- type: entity
  id: BorgChassisTypanSelectable
  parent: BaseBorgChassisTypan
  name: typan selectable cyborg
  components:
    - type: Sprite
      layers:
        - state: robot
          map: ["enum.BorgVisualLayers.Body", "movement"]
        - state: robot_e_r
          map: ["enum.BorgVisualLayers.Light"]
          shader: unshaded
          visible: false
        - state: robot_l
          shader: unshaded
          map: ["light", "enum.BorgVisualLayers.LightStatus"]
          visible: false
    - type: BorgChassis
      maxModules: 0
      hasMindState: robot_e
      noMindState: robot_e_r
    - type: BorgTransponder
      sprite:
        sprite: _Mini/Mobs/Silicon/chassis.rsi
        state: robot
      #   isTypan: true
      name: cyborg
    - type: BorgSwitchableType
      inherentRadioChannels:
        - Typan
      allowedBorgTypes:
        - typan-generic
        - typan-engineering
        - typan-mining
        - typan-janitor
        - typan-medical
        - typan-security
    - type: BorgSwitchableSubtype
      borgSubtype: typan_generic_default
    - type: Mimicry
      realState: robot
      realState1: robot_e_r
      realState2: robot_l
      engState: engineer
      engState1: engineer_e_r
      engState2: engineer_l
      disguiseTypeMap:
        typan-generic: generic
        typan-engineering: engineering
        typan-mining: mining
        typan-janitor: janitor
        typan-medical: medical
        typan-security: engineering
    - type: Appearance

# Typan Generic
- type: entity
  id: BorgChassisTypanGeneric
  parent: BorgChassisTypanSelectable
  name: typan generic cyborg
  components:
    - type: Sprite
      layers:
        - state: robot
          map: ["enum.BorgVisualLayers.Body", "movement"]
        - state: robot_e_r
          map: ["enum.BorgVisualLayers.Light"]
          shader: unshaded
          visible: false
        - state: robot_l
          shader: unshaded
          map: ["light", "enum.BorgVisualLayers.LightStatus"]
          visible: false
    - type: BorgSwitchableType
      selectedBorgType: typan-generic
    - type: SpriteMovement
      movementLayers:
        movement:
          state: robot_moving
      noMovementLayers:
        movement:
          state: robot
    - type: BorgTransponder
      sprite:
        sprite: _Mini/Mobs/Silicon/chassis.rsi
        state: robot
      #   isTypan: true
      name: generic cyborg

